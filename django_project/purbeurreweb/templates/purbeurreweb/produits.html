{% extends "purbeurreweb/base.html" %}
{% block content %}
<!-- Masthead-->
<header class="masthead2">
  <div class="container h-100">
      <div class="row h-100 align-items-center justify-content-center text-center">
          <div class="col-lg-8 align-self-baseline">
              <p class="text-white-85 font-weight-light mb-5">
                  {% for food in mock_food %}
                      <h1>{{ food.name }}</h1>
                      <p>Description : {{ food.description }}</p>
                      <p>Par {{ food.user }}
                      <p>Le {{ food.date|date:"F d, Y" }} à {{ food.date|date:"H" }} heures</p>
                  {% endfor %}
              </p>
          </div>
      </div>
  </div>
</header>
{% endblock content %}
